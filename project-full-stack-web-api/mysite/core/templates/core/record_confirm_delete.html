{% extends "core/base.html" %}
{% block title%}Record Delete Confirmation{% endblock %}

{% block content%}
    <h1>Confirm Delete</h1>
    <p>Are you sure you want to delete this record?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'record_detail' record.pk %}">No, go back</a>
    </form>
{% endblock %}
